name: Bug report
description: Report a reproducible problem in MailVoyage
labels:
  - bug
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include enough detail for us to reproduce quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: Clear one-paragraph summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps from a clean starting point
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Auth
        - Inbox Sync
        - Compose
        - Email Accounts
        - Settings
        - Offline/Cache
        - API
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MailVoyage version
      description: Example: 2026.3.1
      placeholder: 2026.x.x
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node version, deployment mode
      placeholder: Windows 11, Chrome 134, Node 20.x, local Docker Compose
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs or attach screenshots (redact secrets)
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-check
      options:
        - label: I searched existing issues/discussions.
          required: true
        - label: I removed secrets and personal data from logs/screenshots.
          required: true
